name: CI

on:
  push:
    branches: [master, dev, "release/*"]
  pull_request:
    branches: [master, dev]

permissions: {}

jobs:
  lint:
    name: Python Code Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"

      - name: Install ruff
        # Pinned to the same version as .pre-commit-config.yaml to prevent
        # silent ruff-version drift between CI and local pre-commit. See
        # ISS-260522-ruff-format-drift and ADR-010 for context.
        run: pip install "ruff==0.9.0"

      - name: Run ruff (lint)
        run: ruff check custom_components/mikrotik_router tests

      - name: Run ruff (format check)
        run: ruff format --check custom_components/mikrotik_router tests

  tests:
    name: Python Tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # 3.13 = HA 2026.1 - 2026.2 runtime; 3.14 = HA 2026.3+ runtime.
        # See ISS-260509-ha-2026.5-untested for context.
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # Install runtime deps from manifest.json so CI tests the same
        # version constraints HA installs. Test deps stay separate.
        run: |
          python -c "import json; print('\n'.join(json.load(open('custom_components/mikrotik_router/manifest.json'))['requirements']))" > /tmp/runtime-requirements.txt
          cat /tmp/runtime-requirements.txt
          pip install -r /tmp/runtime-requirements.txt
          pip install pytest pytest-homeassistant-custom-component pytest-cov

      - name: Test with pytest
        run: >
          pytest -v --tb=short
          --cov=custom_components/mikrotik_router
          --cov-report=xml:coverage.xml
          --cov-report=term-missing

  security:
    name: Security check - Bandit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit
        run: bandit -c .github/bandit.yaml -r custom_components/mikrotik_router

  hassfest:
    name: Check hassfest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: home-assistant/actions/hassfest@dce0e860c68256ef2902ece06afa5401eb4674e1  # master

  dependency-audit:
    name: Dependency vulnerability check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"

      - name: Run pip-audit
        run: |
          pip install pip-audit
          python -c "
          import json
          manifest = json.load(open('custom_components/mikrotik_router/manifest.json'))
          print('\n'.join(manifest.get('requirements', [])))
          " > /tmp/runtime-requirements.txt
          cat /tmp/runtime-requirements.txt
          pip-audit -r /tmp/runtime-requirements.txt

  manifest-drift:
    name: Manifest <-> requirements drift guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python 3.13
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"

      - name: Assert manifest runtime deps match requirements*.txt
        # Prevents the failure mode where CI silently tests a different
        # librouteros version than HA installs.
        run: |
          python <<'PY'
          import json, pathlib, re, sys

          def key(spec):
              return re.split(r"[<>=!~ ]", spec, maxsplit=1)[0].strip().lower()

          manifest = sorted(
              json.load(open("custom_components/mikrotik_router/manifest.json"))["requirements"],
              key=key,
          )
          manifest_keys = {key(s) for s in manifest}

          failed = False
          for f in ("requirements.txt", "requirements_dev.txt", "requirements_tests.txt"):
              lines = [
                  ln.strip()
                  for ln in pathlib.Path(f).read_text().splitlines()
                  if ln.strip() and not ln.lstrip().startswith("#")
              ]
              runtime = sorted((ln for ln in lines if key(ln) in manifest_keys), key=key)
              if runtime != manifest:
                  print(f"::error file={f}::drift vs manifest.json")
                  print(f"  manifest: {manifest}")
                  print(f"  {f}:     {runtime}")
                  failed = True

          sys.exit(1 if failed else 0)
          PY

  zip-structure:
    name: HACS zip structure check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Build release zip (mirrors release.yml)
        run: cd custom_components/mikrotik_router && zip -r ../../mikrotik_router-check.zip ./

      - name: Assert manifest.json is at zip root
        # HACS requires a flat root layout. A nested
        # mikrotik_router/manifest.json shape installs to the wrong path.
        run: |
          unzip -l mikrotik_router-check.zip | head -30
          if ! unzip -p mikrotik_router-check.zip manifest.json > /dev/null 2>&1; then
            echo "::error::manifest.json is not at zip root"
            exit 1
          fi
          if unzip -l mikrotik_router-check.zip | grep -E "mikrotik_router/manifest.json"; then
            echo "::error::zip is nested under mikrotik_router/"
            exit 1
          fi
          echo "OK: manifest.json at zip root"

  lint-actions:
    name: GitHub Actions lint (actionlint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run actionlint
        env:
          ACTIONLINT_VERSION: "1.7.7"
          # sha256 of actionlint_1.7.7_linux_amd64.tar.gz from the official release checksums
          ACTIONLINT_SHA256: "023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757"
        run: |
          set -euo pipefail
          # Download to a file (not a pipe) so --retry can recover from transient
          # GitHub CDN 504s; verify the pinned checksum before extracting.
          curl -sSfL --proto-redir -all,https \
            --retry 5 --retry-delay 3 --retry-all-errors --retry-connrefused \
            -o actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tar.gz" | sha256sum -c -
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint -color

  secrets:
    name: Secret scanning - Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
